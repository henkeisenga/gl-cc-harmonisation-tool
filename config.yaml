# Paden
input_file_gl: data/General_ledger_masterdata.xlsx
input_file_cc: data/Costcenter_masterdata.xlsx
sheet_gl: Accounts
sheet_cc: CostCenters

# Kolomnamen vertaling (bronbestand -> pipeline verwacht)
column_map_gl:
  BEDRIJF: COMPANY
  GROOTBOEK: ACCOUNT
  OMSCHRIJVING: DESCRIPTION
  OMSCHRIJVING_LANG: DESCRIPTION_LANG
  DATUM_LAATST_GEBRUIKT: LASTUSED_DATE

column_map_cc:
  BEDRIJF: COMPANY
  KOSTENPLAATS: COSTCENTER
  OMSCHRIJVING: DESCRIPTION
  OMSCHRIJVING_LANG: DESCRIPTION_LANG
  DATUM_LAATST_GEBRUIKT: LASTUSED_DATE

# Filters
filter_fislib: []
filter_companies: []
filter_doortrek: true
filter_verdrek: true
lastused_days: 1000

# Output/logging
base_output_dir: output
base_log_dir: logs
log_level: INFO
dry_run: false
verbose: false
